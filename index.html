<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NCAA Tournament Squares Heatmap (2015–2025)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 40px 20px;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 6px;
    color: #fff;
    letter-spacing: -0.5px;
  }
  .subtitle {
    font-size: 14px;
    color: #888;
    margin-bottom: 32px;
  }
  .heatmap-container {
    position: relative;
    display: inline-block;
  }
  .axis-label {
    position: absolute;
    font-size: 13px;
    font-weight: 600;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .axis-label.top {
    top: -28px;
    left: 50%;
    transform: translateX(-50%);
  }
  .axis-label.left {
    left: -32px;
    top: 50%;
    transform: translateY(-50%) rotate(-90deg);
    white-space: nowrap;
  }
  .grid {
    display: grid;
    grid-template-columns: 36px repeat(10, 1fr);
    grid-template-rows: 36px repeat(10, 1fr);
    gap: 2px;
  }
  .corner { }
  .col-header, .row-header {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 700;
    color: #999;
  }
  .cell {
    width: 64px;
    height: 64px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    cursor: default;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
  }
  .cell:hover {
    transform: scale(1.08);
    box-shadow: 0 0 16px rgba(255,255,255,0.15);
    z-index: 2;
  }
  .cell .count {
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
  }
  .cell .pct {
    font-size: 10px;
    opacity: 0.8;
    margin-top: 2px;
  }
  .legend {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 24px;
    font-size: 12px;
    color: #888;
  }
  .legend-bar {
    width: 200px;
    height: 12px;
    border-radius: 6px;
  }
  .stats {
    margin-top: 24px;
    font-size: 13px;
    color: #777;
    text-align: center;
    line-height: 1.8;
  }
  .stats strong { color: #ddd; }
  .tooltip {
    display: none;
    position: fixed;
    background: #1a1a2e;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: #ddd;
    pointer-events: none;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    line-height: 1.6;
  }
</style>

<body>

<h1>NCAA Tournament Squares Heatmap</h1>
<p class="subtitle">Last digit of each team's final score &middot; 2015–2025 (no 2020) &middot; All rounds</p>

<div class="heatmap-container">
  <div class="axis-label top">Winning Team's Last Digit</div>
  <div class="axis-label left">Losing Team's Last Digit</div>
  <div class="grid" id="grid"></div>
</div>

<div class="legend">
  <span>Fewer</span>

<div class="stats" id="stats"></div>

  [71,61],[65,58],[87,61],[86,83],[85,68],[81,75],[77,62],[70,60],[79,62],[74,48],
  [81,58],[94,71],[69,66],[76,73],[90,78],[78,65],[71,59],[60,56],[76,60],[94,83],
  [79,68],[62,58],[57,52],[82,78],[83,78],[89,67],[83,79],[84,53],[55,53],[87,62],

  [83,72],[93,49],[75,72],[81,52],[93,65],[80,71],[85,66],[59,56],[90,81],[89,66],

];

// Compute the 10x10 grid: grid[loserLastDigit][winnerLastDigit]
const grid = Array.from({length: 10}, () => Array(10).fill(0));
let totalGames = 0;

games.forEach(([w, l]) => {
  const wd = w % 10;
  const ld = l % 10;
  grid[ld][wd]++;
  totalGames++;
});

const maxCount = Math.max(...grid.flat());
const minCount = Math.min(...grid.flat());

// Color scale: dark blue → cyan → yellow → orange → red
function getColor(count) {
  const t = maxCount === minCount ? 0.5 : (count - minCount) / (maxCount - minCount);

  // Multi-stop gradient
  let r, g, b;
  if (t < 0.25) {
    const s = t / 0.25;
    r = Math.round(15 + s * 10);
    g = Math.round(20 + s * 60);
    b = Math.round(60 + s * 80);
  } else if (t < 0.5) {
    const s = (t - 0.25) / 0.25;
    r = Math.round(25 + s * 30);
    g = Math.round(80 + s * 100);
    b = Math.round(140 - s * 40);
  } else if (t < 0.75) {
    const s = (t - 0.5) / 0.25;
    r = Math.round(55 + s * 150);
    g = Math.round(180 + s * 40);
    b = Math.round(100 - s * 70);
  } else {
    const s = (t - 0.75) / 0.25;
    r = Math.round(205 + s * 50);
    g = Math.round(220 - s * 100);
    b = Math.round(30 - s * 20);
  }
  return { r, g, b };
}

function colorStr(count) {
  const { r, g, b } = getColor(count);
  return `rgb(${r},${g},${b})`;
}

function textColor(count) {
  const { r, g, b } = getColor(count);
  const lum = 0.299 * r + 0.587 * g + 0.114 * b;
  return lum > 140 ? '#000' : '#fff';
}

// Build grid
const gridEl = document.getElementById('grid');

// Corner
gridEl.innerHTML = '<div class="corner"></div>';

// Column headers (winner last digit)
for (let c = 0; c < 10; c++) {
  gridEl.innerHTML += `<div class="col-header">${c}</div>`;
}

// Rows
for (let r = 0; r < 10; r++) {
  gridEl.innerHTML += `<div class="row-header">${r}</div>`;
  for (let c = 0; c < 10; c++) {
    const count = grid[r][c];
    const pct = ((count / totalGames) * 100).toFixed(1);
    const bg = colorStr(count);
    const fg = textColor(count);
    gridEl.innerHTML += `
      <div class="cell" style="background:${bg};color:${fg}"
           data-row="${r}" data-col="${c}" data-count="${count}" data-pct="${pct}">
        <span class="count">${count}</span>
        <span class="pct">${pct}%</span>
      </div>`;
  }
}

// Legend gradient
const canvas = document.getElementById('legendBar');
const ctx = canvas.getContext('2d');
for (let x = 0; x < 200; x++) {
  const fakeCount = minCount + (x / 199) * (maxCount - minCount);
  ctx.fillStyle = colorStr(fakeCount);
  ctx.fillRect(x, 0, 1, 12);
}

// Stats
const flat = grid.flat().map((v, i) => ({ r: Math.floor(i / 10), c: i % 10, v }));
flat.sort((a, b) => b.v - a.v);
const best = flat.slice(0, 5);
const worst = flat.slice(-5).reverse();

document.getElementById('stats').innerHTML = `
  <strong>${totalGames}</strong> total games analyzed across 10 tournaments (2015–2025, no 2020)<br>
  <br>
  <strong>Best squares:</strong> ${best.map(s => `(${s.c},${s.r}) = ${s.v}`).join(' &middot; ')}<br>
  <strong>Worst squares:</strong> ${worst.map(s => `(${s.c},${s.r}) = ${s.v}`).join(' &middot; ')}
`;

// Tooltip
const tooltip = document.getElementById('tooltip');
document.querySelectorAll('.cell').forEach(cell => {
  cell.addEventListener('mouseenter', e => {
    const r = cell.dataset.row;
    const c = cell.dataset.col;
    const count = cell.dataset.count;
    const pct = cell.dataset.pct;
    tooltip.innerHTML = `
      <strong>Winner ends in ${c}, Loser ends in ${r}</strong><br>
      ${count} games (${pct}% of all games)<br>
      Rank: #${flat.findIndex(s => s.r == r && s.c == c) + 1} of 100
    `;
    tooltip.style.display = 'block';
  });
  cell.addEventListener('mousemove', e => {
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY + 14) + 'px';
  });
  cell.addEventListener('mouseleave', () => {
    tooltip.style.display = 'none';
  });
});
</script>
