    background: #0a0a0f;
    color: #e0e0e0;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 40px 20px;
  }
  h1 {
    font-size: clamp(20px, 4vw, 28px);
    font-weight: 700;
    margin-bottom: 6px;
    color: #fff;
    letter-spacing: -0.5px;
    text-align: center;
  }
  .subtitle {
    font-size: clamp(11px, 2vw, 14px);
    color: #888;
    margin-bottom: 32px;
    text-align: center;
  }
  .heatmap-container {
    position: relative;
    width: min(calc(100vw - 40px), 700px);
    max-width: 700px;
  }
  .axis-label {
    position: absolute;
    font-size: clamp(10px, 1.5vw, 13px);
    font-weight: 600;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .axis-label.top {
    top: -24px;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
  }
  .axis-label.left {
    left: -28px;
    top: 50%;
    transform: translateY(-50%) rotate(-90deg);
    white-space: nowrap;
  }
  .grid {
    display: grid;
    grid-template-columns: minmax(20px, 36px) repeat(10, 1fr);
    grid-template-rows: minmax(20px, 36px) repeat(10, 1fr);
    gap: clamp(1px, 0.4vw, 2px);
    width: 100%;
  }
  .corner { }
  .col-header, .row-header {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(11px, 2vw, 15px);
    font-weight: 700;
    color: #999;
  }
  .cell {
    aspect-ratio: 1;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: clamp(3px, 0.6vw, 6px);
    cursor: default;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
  }
  .cell:hover {
    transform: scale(1.08);
    box-shadow: 0 0 16px rgba(255,255,255,0.15);
    z-index: 2;
  }
  .cell .count {
    font-size: clamp(12px, 2.5vw, 20px);
    font-weight: 700;
    line-height: 1;
  }
  .cell .pct {
    font-size: clamp(7px, 1.2vw, 10px);
    opacity: 0.8;
    margin-top: 1px;
  }
  .legend {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 24px;
    font-size: 12px;
    color: #888;
  }
  .legend-bar {
    width: 200px;
    height: 12px;
    border-radius: 6px;
  }
  .stats {
    margin-top: 24px;
    font-size: clamp(11px, 1.8vw, 13px);
    color: #777;
    text-align: center;
    line-height: 1.8;
    padding: 0 10px;
  }
  .stats strong { color: #ddd; }
  .tooltip {
    display: none;
    position: fixed;
    background: #1a1a2e;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: #ddd;
    pointer-events: none;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    line-height: 1.6;
  }
  @media (max-width: 420px) {
    body { padding: 24px 10px; }
    .subtitle { margin-bottom: 20px; }
    .heatmap-container { width: calc(100vw - 20px); }
    .axis-label.left { left: -22px; }
    .cell .pct { display: none; }
  }
</style>

// Compute the 10x10 grid: grid[loserLastDigit][winnerLastDigit]
const grid = Array.from({length: 10}, () => Array(10).fill(0));
let totalGames = 0;

games.forEach(([w, l]) => {
  const wd = w % 10;
  const ld = l % 10;
  grid[ld][wd]++;
  totalGames++;
});

const maxCount = Math.max(...grid.flat());
const minCount = Math.min(...grid.flat());

// Color scale: dark blue → cyan → yellow → orange → red
function getColor(count) {
  const t = maxCount === minCount ? 0.5 : (count - minCount) / (maxCount - minCount);

  // Multi-stop gradient
  let r, g, b;
  if (t < 0.25) {
    const s = t / 0.25;
    r = Math.round(15 + s * 10);
    g = Math.round(20 + s * 60);
    b = Math.round(60 + s * 80);
  } else if (t < 0.5) {
    const s = (t - 0.25) / 0.25;
    r = Math.round(25 + s * 30);
    g = Math.round(80 + s * 100);
    b = Math.round(140 - s * 40);
  } else if (t < 0.75) {
    const s = (t - 0.5) / 0.25;
    r = Math.round(55 + s * 150);
    g = Math.round(180 + s * 40);
    b = Math.round(100 - s * 70);
  } else {
    const s = (t - 0.75) / 0.25;
    r = Math.round(205 + s * 50);
    g = Math.round(220 - s * 100);
    b = Math.round(30 - s * 20);
  }
  return { r, g, b };
}

function colorStr(count) {
  const { r, g, b } = getColor(count);
  return `rgb(${r},${g},${b})`;
}

function textColor(count) {
  const { r, g, b } = getColor(count);
  const lum = 0.299 * r + 0.587 * g + 0.114 * b;
  return lum > 140 ? '#000' : '#fff';
}

// Build grid
const gridEl = document.getElementById('grid');

// Corner
gridEl.innerHTML = '<div class="corner"></div>';

// Column headers (winner last digit)
for (let c = 0; c < 10; c++) {
  gridEl.innerHTML += `<div class="col-header">${c}</div>`;
}

// Rows
for (let r = 0; r < 10; r++) {
  gridEl.innerHTML += `<div class="row-header">${r}</div>`;
  for (let c = 0; c < 10; c++) {
    const count = grid[r][c];
    const pct = ((count / totalGames) * 100).toFixed(1);
    const bg = colorStr(count);
    const fg = textColor(count);
    gridEl.innerHTML += `
      <div class="cell" style="background:${bg};color:${fg}"
           data-row="${r}" data-col="${c}" data-count="${count}" data-pct="${pct}">
        <span class="count">${count}</span>
        <span class="pct">${pct}%</span>
      </div>`;
  }
}

// Legend gradient
const canvas = document.getElementById('legendBar');
const ctx = canvas.getContext('2d');
for (let x = 0; x < 200; x++) {
  const fakeCount = minCount + (x / 199) * (maxCount - minCount);
  ctx.fillStyle = colorStr(fakeCount);
  ctx.fillRect(x, 0, 1, 12);
}

// Stats
const flat = grid.flat().map((v, i) => ({ r: Math.floor(i / 10), c: i % 10, v }));
flat.sort((a, b) => b.v - a.v);
const best = flat.slice(0, 5);
const worst = flat.slice(-5).reverse();

document.getElementById('stats').innerHTML = `
  <strong>${totalGames}</strong> total games analyzed across 40 tournaments (2005–2025, no 2020)<br>
  <br>
  <strong>Best squares:</strong> ${best.map(s => `(${s.c},${s.r}) = ${s.v}`).join(' &middot; ')}<br>
  <strong>Worst squares:</strong> ${worst.map(s => `(${s.c},${s.r}) = ${s.v}`).join(' &middot; ')}
`;

// Tooltip
const tooltip = document.getElementById('tooltip');
document.querySelectorAll('.cell').forEach(cell => {
  cell.addEventListener('mouseenter', e => {
    const r = cell.dataset.row;
    const c = cell.dataset.col;
    const count = cell.dataset.count;
    const pct = cell.dataset.pct;
    tooltip.innerHTML = `
      <strong>Winner ends in ${c}, Loser ends in ${r}</strong><br>
      ${count} games (${pct}% of all games)<br>
      Rank: #${flat.findIndex(s => s.r == r && s.c == c) + 1} of 100
    `;
    tooltip.style.display = 'block';
  });
  cell.addEventListener('mousemove', e => {
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY + 14) + 'px';
  });
  cell.addEventListener('mouseleave', () => {
    tooltip.style.display = 'none';
  });
});
